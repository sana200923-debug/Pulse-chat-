<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="pulse.chat">
<title>pulse.chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#E8643A;--accent2:#F5A07A;
  --bg:#ffffff;--bg2:#F5F4F1;--bg3:#EEECE8;
  --text:#1A1A18;--text2:#888780;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --radius:14px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A1A18;--bg2:#242422;--bg3:#0F0F0E;
  --text:#F1EFE8;--text2:#888780;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
}}
html,body{height:100%;font-family:'Manrope',sans-serif;background:var(--bg3);color:var(--text);font-size:15px}
body{display:flex;flex-direction:column;max-width:600px;margin:0 auto;height:100dvh;overflow:hidden}

/* Setup screen */
#setup-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:32px;gap:24px;
}
.setup-logo{font-size:32px;font-weight:600;color:var(--accent);letter-spacing:-1px}
.setup-logo span{color:var(--text)}
.setup-sub{font-size:14px;color:var(--text2);text-align:center}
.setup-input{
  width:100%;padding:14px 16px;border:1.5px solid var(--border2);
  border-radius:var(--radius);background:var(--bg);color:var(--text);
  font-family:'Manrope',sans-serif;font-size:16px;outline:none;
}
.setup-input:focus{border-color:var(--accent)}
.setup-btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);font-family:'Manrope',sans-serif;
  font-size:16px;font-weight:600;cursor:pointer;
}
.setup-btn:active{opacity:0.85}

/* App */
#app-screen{display:none;flex-direction:column;height:100%}
.topbar{
  background:var(--bg);border-bottom:0.5px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.logo{font-size:20px;font-weight:600;color:var(--accent);letter-spacing:-0.5px}
.logo span{color:var(--text)}
.online-dot{width:7px;height:7px;background:#4CAF50;border-radius:50%;animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.user-chip{
  display:flex;align-items:center;gap:6px;
  background:var(--bg2);border-radius:20px;padding:5px 10px 5px 6px;
  font-size:13px;font-weight:500;cursor:pointer;border:none;color:var(--text);
}
.avatar{
  width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;
}
.avatar-lg{width:36px;height:36px;font-size:13px}

/* Feed */
.feed{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}

/* Compose */
.compose{
  background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:12px;flex-shrink:0;
}
.compose-top{display:flex;gap:10px;align-items:flex-start}
.compose textarea{
  flex:1;border:none;background:transparent;resize:none;
  font-family:'Manrope',sans-serif;font-size:14px;color:var(--text);
  line-height:1.5;height:56px;outline:none;
}
.compose textarea::placeholder{color:var(--text2)}
.compose-bottom{
  display:flex;align-items:center;gap:8px;margin-top:8px;
  padding-top:8px;border-top:0.5px solid var(--border);
}
.icon-btn{
  background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);
  padding:6px 10px;font-size:13px;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;gap:5px;font-family:'Manrope',sans-serif;
}
.icon-btn:active{background:var(--bg2)}
.post-btn{
  margin-left:auto;background:var(--accent);color:#fff;border:none;
  border-radius:20px;padding:7px 18px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:'Manrope',sans-serif;
}
.post-btn:disabled{opacity:0.4}
.post-btn:active{opacity:0.85}
.photo-preview{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb{width:64px;height:64px;border-radius:var(--radius-sm);object-fit:cover;border:0.5px solid var(--border)}
.thumb-rm{
  position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;
  border:none;border-radius:50%;width:18px;height:18px;font-size:12px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
#file-input{display:none}

/* Posts */
.post{
  background:var(--bg);border:0.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  animation:fadeUp 0.25s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.post-header{display:flex;align-items:center;gap:8px;padding:12px 14px 8px}
.post-author{font-size:13px;font-weight:600;color:var(--text)}
.post-time{font-size:12px;color:var(--text2);margin-left:auto}
.post-body{padding:0 14px 10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-photos{display:grid;gap:2px}
.post-photos.one img{width:100%;max-height:320px;object-fit:cover;display:block}
.post-photos.two{grid-template-columns:1fr 1fr}
.post-photos.two img{height:190px;object-fit:cover;width:100%;display:block}
.post-photos.many{grid-template-columns:1fr 1fr 1fr}
.post-photos.many img{height:130px;object-fit:cover;width:100%;display:block}
.post-actions{
  display:flex;align-items:center;gap:2px;
  padding:6px 10px;border-top:0.5px solid var(--border);
}
.action-btn{
  background:none;border:none;display:flex;align-items:center;gap:5px;
  font-size:13px;color:var(--text2);cursor:pointer;padding:6px 8px;
  border-radius:var(--radius-sm);font-family:'Manrope',sans-serif;transition:background 0.15s;
}
.action-btn:active{background:var(--bg2)}
.action-btn.liked{color:var(--accent)}
.heart-icon{font-size:18px;transition:transform 0.15s}
.action-btn.liked .heart-icon{transform:scale(1.2)}
.action-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.action-btn.liked svg.heart-svg{fill:var(--accent);stroke:var(--accent)}

/* Comments */
.comments-section{padding:0 14px 10px;display:none}
.comment{display:flex;gap:8px;margin-bottom:8px}
.comment-bubble{flex:1;background:var(--bg2);border-radius:10px;padding:7px 10px}
.comment-author{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.comment-text{font-size:13px;color:var(--text);line-height:1.4;word-break:break-word}
.comment-input-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.comment-input-row input{
  flex:1;border:0.5px solid var(--border2);border-radius:20px;
  padding:8px 14px;font-size:13px;background:var(--bg2);color:var(--text);
  font-family:'Manrope',sans-serif;outline:none;
}
.comment-input-row input:focus{border-color:var(--accent)}
.send-btn{
  background:var(--accent);color:#fff;border:none;border-radius:50%;
  width:32px;height:32px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}
.send-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Empty + loading */
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:12px}
.spinner{
  width:24px;height:24px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:40px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Firebase config notice */
.config-banner{
  background:#FFF3CD;color:#856404;padding:10px 14px;
  font-size:13px;border-bottom:1px solid #FFEEBA;
  display:none;
}

/* Likes modal */
.likes-modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  display:none;align-items:flex-end;justify-content:center;z-index:100;
}
.likes-modal{
  background:var(--bg);border-radius:var(--radius) var(--radius) 0 0;
  padding:20px;width:100%;max-width:600px;max-height:60vh;overflow-y:auto;
}
.likes-modal h3{font-size:16px;font-weight:600;margin-bottom:14px}
.like-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.like-item:last-child{border:none}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ -->

<!-- Setup screen -->
<div id="setup-screen">
  <div class="setup-logo">pulse<span>.chat</span></div>
  <p class="setup-sub">Мессенджер для тебя и друзей.<br>Введи имя чтобы начать.</p>
  <input class="setup-input" id="name-input" type="text" placeholder="Твоё имя" maxlength="24" autocomplete="off">
  <button class="setup-btn" onclick="startApp()">Войти →</button>
</div>

<!-- App screen -->
<div id="app-screen">
  <div class="topbar">
    <div class="logo">pulse<span>.chat</span></div>
    <div class="online-dot" id="online-dot"></div>
    <div class="topbar-right">
      <button class="user-chip" onclick="changeUser()">
        <div class="avatar" id="topbar-avatar"></div>
        <span id="topbar-name"></span>
      </button>
    </div>
  </div>

  <div class="feed" id="feed">
    <!-- Compose -->
    <div class="compose">
      <div class="compose-top">
        <div class="avatar avatar-lg" id="compose-avatar"></div>
        <textarea id="post-text" placeholder="Что нового? Поделись с друзьями..."></textarea>
      </div>
      <div id="photo-preview" class="photo-preview"></div>
      <div class="compose-bottom">
        <button class="icon-btn" onclick="document.getElementById('file-input').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
          Фото
        </button>
        <input type="file" id="file-input" accept="image/*" multiple>
        <button class="post-btn" id="post-btn" onclick="createPost()">Опубликовать</button>
      </div>
    </div>

    <!-- Posts will be inserted here -->
    <div id="posts-container">
      <div class="spinner"></div>
    </div>

</div>

<!-- Likes modal -->
<div class="likes-modal-bg" id="likes-modal-bg" onclick="closeLikesModal()">

    <h3>Лайки</h3>
    <div id="likes-list"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, push, onValue, update, serverTimestamp, query, orderByChild, limitToLast }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import { getStorage, ref as sRef, uploadString, getDownloadURL }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

// ── helpers ──────────────────────────────────────────
const COLORS=[
  {bg:'#FAECE7',fg:'#993C1D'},{bg:'#E6F1FB',fg:'#185FA5'},
  {bg:'#EAF3DE',fg:'#3B6D11'},{bg:'#FAEEDA',fg:'#854F0B'},
  {bg:'#EEEDFE',fg:'#534AB7'},{bg:'#E1F5EE',fg:'#0F6E56'},
  {bg:'#FBEAF0',fg:'#993556'},{bg:'#EAF3DE',fg:'#27500A'}
];
function colorFor(name){let h=0;for(let c of(name||''))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[Math.abs(h)%COLORS.length];}
function initials(name){return(name||'?').split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function setAv(el,name){const c=colorFor(name);el.style.background=c.bg;el.style.color=c.fg;el.textContent=initials(name);}
function timeAgo(ts){
  const d=Date.now()-ts,s=Math.floor(d/1e3),m=Math.floor(s/60),h=Math.floor(m/60),day=Math.floor(h/24);
  if(s<60)return'только что';if(m<60)return m+'м';if(h<24)return h+'ч';return day+'д';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function svgHeart(filled){
  return`<svg viewBox="0 0 24 24" class="heart-svg" style="${filled?'fill:var(--accent);stroke:var(--accent)':''}"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
}
function svgComment(){return`<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`;}
function svgSend(){return`<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;}

// ── state ─────────────────────────────────────────────
let username='',db,storage,pendingPhotos=[],postsMap={};

window.changeUser=function(){
  if(confirm('Сменить имя?')){localStorage.removeItem('pulse_username');location.reload();}
};
window.closeLikesModal=function(){document.getElementById('likes-modal-bg').style.display='none';}

// ── setup ─────────────────────────────────────────────
window.startApp=function(){
  const name=document.getElementById('name-input').value.trim();
  if(!name)return;
  localStorage.setItem('pulse_username',name);
  launch(name);
};
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.startApp();});

const saved=localStorage.getItem('pulse_username');
if(saved)launch(saved);else document.getElementById('setup-screen').style.display='flex';

function launch(name){
  username=name;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  setAv(document.getElementById('topbar-avatar'),name);
  setAv(document.getElementById('compose-avatar'),name);
  document.getElementById('topbar-name').textContent=name;

  // check config
  const cfg=FIREBASE_CONFIG;
  if(cfg.apiKey.startsWith('ВСТАВЬ')){
    const banner=document.createElement('div');
    banner.style.cssText='background:#FFF3CD;color:#856404;padding:10px 14px;font-size:13px;border-bottom:1px solid #FFEEBA;';
    banner.textContent='⚠️ Firebase не настроен. Следуй инструкции в файле ИНСТРУКЦИЯ.txt';
    document.getElementById('app-screen').insertBefore(banner,document.getElementById('app-screen').children[1]);
    document.getElementById('posts-container').innerHTML='<div class="empty-state"><div class="empty-icon">⚙️</div>Вставь данные Firebase,<br>чтобы начать</div>';
    return;
  }

  const app=initializeApp(cfg);
  db=getDatabase(app);
  storage=getStorage(app);
  document.getElementById('online-dot').style.display='block';
  listenPosts();
}

// ── photos ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change',function(e){
  Array.from(e.target.files).forEach(f=>{
    if(f.size>5*1024*1024){alert('Фото слишком большое (макс 5МБ)');return;}
    const r=new FileReader();
    r.onload=ev=>{pendingPhotos.push(ev.target.result);renderPreviews();};
    r.readAsDataURL(f);
  });
  this.value='';
});
function renderPreviews(){
  const pp=document.getElementById('photo-preview');pp.innerHTML='';
  pendingPhotos.forEach((src,i)=>{
    const w=document.createElement('div');w.className='photo-thumb-wrap';
    const img=document.createElement('img');img.src=src;img.className='photo-thumb';
    const rm=document.createElement('button');rm.className='thumb-rm';rm.textContent='×';
    rm.onclick=()=>{pendingPhotos.splice(i,1);renderPreviews();};
    w.appendChild(img);w.appendChild(rm);pp.appendChild(w);
  });
}

// ── create post ───────────────────────────────────────
window.createPost=async function(){
  const text=document.getElementById('post-text').value.trim();
  if(!text&&!pendingPhotos.length)return;
  const btn=document.getElementById('post-btn');
  btn.disabled=true;btn.textContent='Отправка...';

  let photoURLs=[];
  if(storage&&pendingPhotos.length){
    try{
      photoURLs=await Promise.all(pendingPhotos.map(async(data,i)=>{
        const r=sRef(storage,`photos/${Date.now()}_${i}`);
        await uploadString(r,data,'data_url');
        return getDownloadURL(r);
      }));
    }catch(e){alert('Ошибка загрузки фото: '+e.message);btn.disabled=false;btn.textContent='Опубликовать';return;}
  }

  const postRef=ref(db,'posts');
  await push(postRef,{author:username,text,photos:photoURLs,likes:{},comments:{},ts:serverTimestamp()});
  document.getElementById('post-text').value='';
  pendingPhotos=[];renderPreviews();
  btn.disabled=false;btn.textContent='Опубликовать';
};

// ── listen posts ──────────────────────────────────────
function listenPosts(){
  const q=query(ref(db,'posts'),orderByChild('ts'),limitToLast(50));
  onValue(q,snap=>{
    const posts=[];
    snap.forEach(child=>{posts.push({id:child.key,...child.val()});});
    posts.reverse();
    const container=document.getElementById('posts-container');
    if(!posts.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">💬</div>Пока нет постов.<br>Будь первым!</div>';return;}
    // update or add posts
    const existingIds=new Set(Object.keys(postsMap));
    posts.forEach(post=>{
      postsMap[post.id]=post;
      if(existingIds.has(post.id)){
        updatePostEl(post);
      }else{
        const el=buildPostEl(post);
        const ref2=container.querySelector('.post');
        if(ref2)container.insertBefore(el,ref2);else container.appendChild(el);
      }
    });
    // remove spinner
    const spin=container.querySelector('.spinner');if(spin)spin.remove();
    const empty=container.querySelector('.empty-state');if(empty&&posts.length)empty.remove();
  });
}

// ── build post element ────────────────────────────────
function buildPostEl(post){
  const div=document.createElement('div');div.className='post';div.dataset.id=post.id;
  div.innerHTML=postInnerHTML(post);
  return div;
}
function updatePostEl(post){
  const el=document.querySelector(`.post[data-id="${post.id}"]`);
  if(!el)return;
  // update likes count & state
  const likes=post.likes||{};
  const likeCount=Object.keys(likes).length;
  const liked=Object.values(likes).includes(username);
  const likeBtn=el.querySelector('.action-btn.like-btn');
  if(likeBtn){
    likeBtn.className='action-btn like-btn'+(liked?' liked':'');
    likeBtn.querySelector('.like-count').textContent=likeCount||'';
    likeBtn.querySelector('.heart-svg-wrap').innerHTML=svgHeart(liked);
  }
  // update comments
  const comments=post.comments||{};
  const commentCount=Object.keys(comments).length;
  const commentBtn=el.querySelector('.comment-count');
  if(commentBtn)commentBtn.textContent=commentCount||'';
  // update comments list if open
  const sec=el.querySelector('.comments-section');
  if(sec&&sec.style.display!=='none'){
    renderCommentsList(el,post);
  }
}
function postInnerHTML(post){
  const photos=Object.values(post.photos||[]).filter(Boolean);
  const likes=post.likes||{};
  const likeCount=Object.keys(likes).length;
  const liked=Object.values(likes).includes(username);
  const comments=post.comments||{};
  const commentCount=Object.keys(comments).length;
  const c=colorFor(post.author);
  const gridClass=photos.length===1?'one':photos.length===2?'two':photos.length>2?'many':'';

  return`
    <div class="post-header">
      <div class="avatar" style="background:${c.bg};color:${c.fg}">${initials(post.author)}</div>
      <span class="post-author">${esc(post.author||'Аноним')}</span>
      <span class="post-time">${post.ts?timeAgo(post.ts):''}</span>
    </div>
    ${post.text?`<div class="post-body">${esc(post.text)}</div>`:''}
    ${photos.length?`<div class="post-photos ${gridClass}">${photos.map(u=>`<img src="${u}" loading="lazy" alt="">`).join('')}</div>`:''}
    <div class="post-actions">
      <button class="action-btn like-btn${liked?' liked':''}" onclick="toggleLike('${post.id}')">
        <span class="heart-svg-wrap">${svgHeart(liked)}</span>
        <span class="like-count">${likeCount||''}</span>
      </button>
      <button class="action-btn" onclick="toggleComments('${post.id}')">
        ${svgComment()}
        <span class="comment-count">${commentCount||''}</span>
      </button>
      ${likeCount?`<button class="action-btn" style="margin-left:auto;font-size:12px;color:var(--text2)" onclick="showLikes('${post.id}')">кто лайкнул</button>`:''}
    </div>
    <div class="comments-section" id="cs-${post.id}">
      <div class="comments-list" id="cl-${post.id}"></div>
      <div class="comment-input-row">
        <div class="avatar" style="background:${colorFor(username).bg};color:${colorFor(username).fg};width:26px;height:26px;font-size:10px">${initials(username)}</div>
        <input type="text" placeholder="Комментарий..." id="ci-${post.id}" onkeydown="if(event.key==='Enter')addComment('${post.id}')">
        <button class="send-btn" onclick="addComment('${post.id}')">${svgSend()}</button>
      </div>
    </div>
  `;
}
function renderCommentsList(el,post){
  const list=el.querySelector('.comments-list');if(!list)return;
  const comments=Object.values(post.comments||{}).sort((a,b)=>(a.ts||0)-(b.ts||0));
  list.innerHTML=comments.map(cm=>{
    const c=colorFor(cm.author);
    return`<div class="comment">
      <div class="avatar" style="background:${c.bg};color:${c.fg};width:26px;height:26px;font-size:10px">${initials(cm.author)}</div>
      <div class="comment-bubble"><div class="comment-author">${esc(cm.author)}</div><div class="comment-text">${esc(cm.text)}</div></div>
    </div>`;
  }).join('');
}

// ── actions ───────────────────────────────────────────
window.toggleLike=async function(postId){
  const post=postsMap[postId];if(!post)return;
  const likes=post.likes||{};
  const myKey=Object.keys(likes).find(k=>likes[k]===username);
  const updates={};
  if(myKey){updates[`posts/${postId}/likes/${myKey}`]=null;}
  else{updates[`posts/${postId}/likes/${Date.now()}`]=username;}
  await update(ref(db),updates);
};

window.toggleComments=function(postId){
  const sec=document.getElementById('cs-'+postId);if(!sec)return;
  const open=sec.style.display==='none'||!sec.style.display;
  sec.style.display=open?'block':'none';
  if(open){
    renderCommentsList(sec.closest('.post'),postsMap[postId]);
    setTimeout(()=>document.getElementById('ci-'+postId)?.focus(),50);
  }
};

window.addComment=async function(postId){
  const inp=document.getElementById('ci-'+postId);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  const updates={};
  updates[`posts/${postId}/comments/${Date.now()}`]={author:username,text,ts:Date.now()};
  await update(ref(db),updates);
};

window.showLikes=function(postId){
  const post=postsMap[postId];if(!post)return;
  const likes=Object.values(post.likes||{});
  const list=document.getElementById('likes-list');
  list.innerHTML=likes.map(name=>{
    const c=colorFor(name);
    return`<div class="like-item">
      <div class="avatar" style="background:${c.bg};color:${c.fg};width:32px;height:32px">${initials(name)}</div>
      <span style="font-size:14px;font-weight:500">${esc(name)}</span>
    </div>`;
  }).join('');
  document.getElementById('likes-modal-bg').style.display='flex';
};
</script>
</body>
</html>
