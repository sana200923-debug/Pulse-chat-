<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>scam.chat</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#2ECC71;--accent-dark:#27AE60;--danger:#E74C3C;
  --bg:#0D0D0D;--bg2:#1A1A1A;--bg3:#242424;--bg4:#2E2E2E;
  --text:#F0F0F0;--text2:#888;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --radius:14px;--radius-sm:8px;
}
html,body{height:100%;font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);font-size:15px;overflow:hidden}
body{display:flex;flex-direction:column;max-width:640px;margin:0 auto;height:100dvh}

/* ── AUTH ── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:32px;gap:20px;background:var(--bg)}
.auth-logo{font-size:36px;font-weight:700;color:var(--accent);letter-spacing:-1px}
.auth-logo span{color:var(--text2)}
.auth-sub{font-size:14px;color:var(--text2);text-align:center}
.auth-tabs{display:flex;background:var(--bg2);border-radius:var(--radius);padding:4px;width:100%}
.auth-tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text2);border:none;background:none;font-family:'Manrope',sans-serif}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.auth-form{display:flex;flex-direction:column;gap:12px;width:100%}
.auth-input{width:100%;padding:14px 16px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:'Manrope',sans-serif;font-size:15px;outline:none}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:var(--radius);font-family:'Manrope',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.auth-btn:active{opacity:0.85}
.auth-btn:disabled{opacity:0.5;cursor:default}
.auth-error{font-size:13px;color:var(--danger);text-align:center;min-height:18px}

/* ── APP ── */
#app-screen{display:none;flex-direction:column;height:100%}

/* Tabs */
.bottom-nav{display:flex;background:var(--bg2);border-top:0.5px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:none;color:var(--text2);cursor:pointer;font-family:'Manrope',sans-serif;font-size:11px;gap:4px}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--accent)}
.nav-btn.active svg{stroke:var(--accent)}

/* Pages */
.page{display:none;flex-direction:column;flex:1;overflow:hidden}
.page.active{display:flex}

/* Topbar */
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{font-size:20px;font-weight:700;color:var(--accent);letter-spacing:-0.5px}
.logo span{color:var(--text2)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:5px 10px 5px 6px;font-size:13px;font-weight:500;cursor:pointer;border:none;color:var(--text)}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.avatar-lg{width:38px;height:38px;font-size:14px}

/* Feed */
.feed{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}

/* Compose */
.compose{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:12px;flex-shrink:0}
.compose-top{display:flex;gap:10px;align-items:flex-start}
.compose textarea{flex:1;border:none;background:transparent;resize:none;font-family:'Manrope',sans-serif;font-size:14px;color:var(--text);line-height:1.5;height:56px;outline:none}
.compose textarea::placeholder{color:var(--text2)}
.compose-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)}
.icon-btn{background:none;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:6px 10px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Manrope',sans-serif}
.icon-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.post-btn{margin-left:auto;background:var(--accent);color:#000;border:none;border-radius:20px;padding:7px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif}
.post-btn:disabled{opacity:0.4}
.photo-preview-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb{width:64px;height:64px;border-radius:var(--radius-sm);object-fit:cover;border:0.5px solid var(--border)}
.thumb-rm{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#file-input{display:none}

/* Posts */
.post{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeUp 0.25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.post-header{display:flex;align-items:center;gap:8px;padding:12px 14px 8px}
.post-author{font-size:13px;font-weight:600}
.post-time{font-size:12px;color:var(--text2);margin-left:auto}
.post-delete{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center}
.post-delete:active{background:var(--bg4)}
.post-delete svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.post-body{padding:0 14px 10px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-photos{display:grid;gap:2px}
.post-photos.one img{width:100%;max-height:320px;object-fit:cover;display:block}
.post-photos.two{grid-template-columns:1fr 1fr}
.post-photos.two img{height:190px;object-fit:cover;width:100%;display:block}
.post-photos.many{grid-template-columns:1fr 1fr 1fr}
.post-photos.many img{height:130px;object-fit:cover;width:100%;display:block}
.post-actions{display:flex;align-items:center;gap:2px;padding:6px 10px;border-top:0.5px solid var(--border)}
.action-btn{background:none;border:none;display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;padding:6px 8px;border-radius:var(--radius-sm);font-family:'Manrope',sans-serif}
.action-btn:active{background:var(--bg4)}
.action-btn.liked{color:var(--accent)}
.action-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.action-btn.liked svg.heart-svg{fill:var(--accent);stroke:var(--accent)}
.comments-section{padding:0 14px 10px;display:none}
.comment{display:flex;gap:8px;margin-bottom:8px;animation:fadeUp 0.2s ease}
.comment-bubble{flex:1;background:var(--bg3);border-radius:10px;padding:7px 10px}
.comment-author{font-size:12px;font-weight:600;margin-bottom:2px}
.comment-text{font-size:13px;line-height:1.4;word-break:break-word}
.comment-input-row{display:flex;gap:8px;align-items:center;margin-top:6px}
.comment-input-row input{flex:1;border:0.5px solid var(--border2);border-radius:20px;padding:8px 14px;font-size:13px;background:var(--bg3);color:var(--text);font-family:'Manrope',sans-serif;outline:none}
.comment-input-row input:focus{border-color:var(--accent)}
.send-btn{background:var(--accent);color:#000;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn svg{width:14px;height:14px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px;line-height:1.8}
.spinner{width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SNAKE GAME ── */
#game-page{background:var(--bg);flex-direction:column}
.game-topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.game-title{font-size:18px;font-weight:700;color:var(--accent)}
.score-badge{margin-left:auto;background:var(--bg2);border-radius:20px;padding:6px 14px;font-size:14px;font-weight:600}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:16px;overflow:hidden}
#snake-canvas{border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:#111;touch-action:none}
.game-controls{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:8px;width:160px}
.ctrl-btn{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:var(--text);font-size:20px;active-background:var(--bg4)}
.ctrl-btn:active{background:var(--bg4)}
.ctrl-up{grid-column:2;grid-row:1}
.ctrl-left{grid-column:1;grid-row:2}
.ctrl-down{grid-column:2;grid-row:2}
.ctrl-right{grid-column:3;grid-row:2}
.game-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,0.85);border-radius:var(--radius-sm)}
.overlay-title{font-size:24px;font-weight:700}
.overlay-score{font-size:16px;color:var(--text2)}
.play-btn{background:var(--accent);color:#000;border:none;border-radius:20px;padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif}

/* Leaderboard */
.leaderboard{width:100%;max-width:400px}
.lb-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px;text-align:center}
.lb-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:6px}
.lb-rank{font-size:13px;font-weight:700;color:var(--text2);width:20px}
.lb-rank.gold{color:#F1C40F}
.lb-rank.silver{color:#BDC3C7}
.lb-rank.bronze{color:#E67E22}
.lb-name{font-size:14px;font-weight:500;flex:1}
.lb-score{font-size:14px;font-weight:700;color:var(--accent)}

/* Profile */
#profile-page{background:var(--bg);padding:20px;overflow-y:auto}
.profile-card{background:var(--bg2);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:16px}
.profile-avatar-lg{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.profile-name{font-size:18px;font-weight:700}
.profile-email{font-size:13px;color:var(--text2)}
.logout-btn{width:100%;padding:14px;background:var(--bg2);color:var(--danger);border:1px solid var(--danger);border-radius:var(--radius);font-family:'Manrope',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
.profile-stat{background:var(--bg2);border-radius:var(--radius);padding:16px;display:flex;justify-content:space-around;margin-bottom:16px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px}

/* Cloudinary banner */
.cloud-banner{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:10px;display:none}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getDatabase, ref, push, onValue, update, remove, query, orderByChild, limitToLast, get }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

// ── init ──────────────────────────────────────────────
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getDatabase(app);

// ── helpers ───────────────────────────────────────────
const COLORS=[
  {bg:'#0D2B1A',fg:'#2ECC71'},{bg:'#1A1A2E',fg:'#7B68EE'},
  {bg:'#2B1A0D',fg:'#E67E22'},{bg:'#1A0D2B',fg:'#E91E8C'},
  {bg:'#0D1A2B',fg:'#3498DB'},{bg:'#2B0D0D',fg:'#E74C3C'},
  {bg:'#1A2B0D',fg:'#A3E635'},{bg:'#2B2B0D',fg:'#F1C40F'}
];
function colorFor(str){let h=0;for(let c of(str||''))h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[Math.abs(h)%COLORS.length];}
function initials(name){return(name||'?').split(' ').slice(0,2).map(w=>w[0].toUpperCase()).join('');}
function setAv(el,name){const c=colorFor(name);el.style.background=c.bg;el.style.color=c.fg;el.textContent=initials(name);}
function timeAgo(ts){
  const d=Date.now()-ts,s=Math.floor(d/1e3),m=Math.floor(s/60),h=Math.floor(m/60),day=Math.floor(h/24);
  if(s<10)return'только что';if(s<60)return s+'с';if(m<60)return m+'м';if(h<24)return h+'ч';return day+'д';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function svgHeart(f){return`<svg viewBox="0 0 24 24" class="heart-svg" ${f?'style="fill:var(--accent);stroke:var(--accent)"':''}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;}

// ── state ─────────────────────────────────────────────
let currentUser=null, postsMap={}, pendingPhotos=[], authMode='login';

// ── auth UI ───────────────────────────────────────────
window.switchTab=function(mode){
  authMode=mode;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(mode==='login'&&i===0)||(mode==='register'&&i===1)));
  document.getElementById('auth-name').style.display=mode==='register'?'block':'none';
  document.getElementById('auth-submit').textContent=mode==='login'?'Войти':'Зарегистрироваться';
  document.getElementById('auth-error').textContent='';
};

window.doAuth=async function(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const name=document.getElementById('auth-name').value.trim();
  const btn=document.getElementById('auth-submit');
  const errEl=document.getElementById('auth-error');
  if(!email||!password){errEl.textContent='Заполни все поля';return;}
  if(authMode==='register'&&!name){errEl.textContent='Введи имя';return;}
  btn.disabled=true;errEl.textContent='';
  try{
    if(authMode==='register'){
      const cred=await createUserWithEmailAndPassword(auth,email,password);
      await updateProfile(cred.user,{displayName:name});
    }else{
      await signInWithEmailAndPassword(auth,email,password);
    }
  }catch(e){
    const msgs={
      'auth/email-already-in-use':'Email уже используется',
      'auth/weak-password':'Пароль минимум 6 символов',
      'auth/invalid-email':'Неверный email',
      'auth/invalid-credential':'Неверный email или пароль',
      'auth/user-not-found':'Пользователь не найден',
      'auth/wrong-password':'Неверный пароль',
    };
    errEl.textContent=msgs[e.code]||'Ошибка: '+e.message;
    btn.disabled=false;
  }
};
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('auth-screen').style.display!=='none')window.doAuth();});

window.doLogout=async function(){
  if(confirm('Выйти из аккаунта?'))await signOut(auth);
};

// ── auth state ────────────────────────────────────────
onAuthStateChanged(auth,user=>{
  if(user){
    currentUser=user;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    const name=user.displayName||user.email.split('@')[0];
    setAv(document.getElementById('topbar-avatar'),name);
    document.getElementById('topbar-name').textContent=name;
    setAv(document.getElementById('compose-avatar'),name);
    setAv(document.getElementById('profile-avatar-lg'),name);
    document.getElementById('profile-name-display').textContent=name;
    document.getElementById('profile-email-display').textContent=user.email;
    // check cloudinary
    if(CLOUDINARY_CONFIG.cloudName.startsWith('ВСТАВЬ')){
      document.getElementById('cloud-banner').style.display='block';
      document.getElementById('photo-btn').style.opacity='0.4';
      document.getElementById('photo-btn').onclick=()=>alert('Настрой Cloudinary — см. инструкцию');
    }
    listenPosts();
    loadLeaderboard();
    loadUserStats();
  }else{
    currentUser=null;
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

// ── pages ─────────────────────────────────────────────
window.switchPage=function(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(page+'-page').classList.add('active');
  document.getElementById('nav-'+page)?.classList.add('active');
  if(page==='game')initSnake();
  if(page==='profile')loadUserStats();
};

// ── photos ────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change',function(e){
  if(CLOUDINARY_CONFIG.cloudName.startsWith('ВСТАВЬ')){
    // store as base64 compressed
    Array.from(e.target.files).forEach(f=>{
      if(f.size>3*1024*1024){alert('Фото слишком большое');return;}
      const reader=new FileReader();
      reader.onload=ev=>{
        // compress via canvas
        const img=new Image();
        img.onload=()=>{
          const canvas=document.createElement('canvas');
          const max=600;let w=img.width,h=img.height;
          if(w>max){h=h*max/w;w=max;}if(h>max){w=w*max/h;h=max;}
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          pendingPhotos.push(canvas.toDataURL('image/jpeg',0.6));
          renderPreviews();
        };img.src=ev.target.result;
      };reader.readAsDataURL(f);
    });
  }else{
    Array.from(e.target.files).forEach(f=>{
      const reader=new FileReader();
      reader.onload=ev=>{pendingPhotos.push({file:f,preview:ev.target.result});renderPreviews();};
      reader.readAsDataURL(f);
    });
  }
  this.value='';
});

function renderPreviews(){
  const row=document.getElementById('photo-preview-row');row.innerHTML='';
  pendingPhotos.forEach((p,i)=>{
    const src=typeof p==='string'?p:p.preview;
    const w=document.createElement('div');w.className='photo-thumb-wrap';
    const img=document.createElement('img');img.src=src;img.className='photo-thumb';
    const rm=document.createElement('button');rm.className='thumb-rm';rm.textContent='×';
    rm.onclick=()=>{pendingPhotos.splice(i,1);renderPreviews();};
    w.appendChild(img);w.appendChild(rm);row.appendChild(w);
  });
}

async function uploadToCloudinary(file){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CLOUDINARY_CONFIG.uploadPreset);
  const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`,{method:'POST',body:fd});
  const data=await r.json();
  return data.secure_url;
}

// ── create post ───────────────────────────────────────
window.createPost=async function(){
  const text=document.getElementById('post-text').value.trim();
  if(!text&&!pendingPhotos.length)return;
  const btn=document.querySelector('.post-btn');
  btn.disabled=true;btn.textContent='Отправка...';
  let photoURLs=[];
  try{
    if(pendingPhotos.length){
      if(CLOUDINARY_CONFIG.cloudName.startsWith('ВСТАВЬ')){
        // store base64 directly
        photoURLs=pendingPhotos.map(p=>typeof p==='string'?p:p.preview);
      }else{
        photoURLs=await Promise.all(pendingPhotos.map(p=>uploadToCloudinary(p.file||p)));
      }
    }
    const name=currentUser.displayName||currentUser.email.split('@')[0];
    await push(ref(db,'posts'),{
      author:name,uid:currentUser.uid,text,photos:photoURLs,
      likes:{},comments:{},ts:Date.now()
    });
    document.getElementById('post-text').value='';
    pendingPhotos=[];renderPreviews();
  }catch(e){alert('Ошибка: '+e.message);}
  btn.disabled=false;btn.textContent='Опубликовать';
};

// ── listen posts ──────────────────────────────────────
function listenPosts(){
  const q=query(ref(db,'posts'),orderByChild('ts'),limitToLast(60));
  onValue(q,snap=>{
    const posts=[];snap.forEach(c=>posts.push({id:c.key,...c.val()}));
    posts.reverse();
    const container=document.getElementById('posts-container');
    postsMap={};
    posts.forEach(p=>postsMap[p.id]=p);
    if(!posts.length){container.innerHTML='<div class="empty-state">Пока нет постов 👀<br>Напиши первым!</div>';return;}
    container.innerHTML='';
    posts.forEach(p=>container.appendChild(buildPostEl(p)));
  });
}

function buildPostEl(post){
  const div=document.createElement('div');div.className='post';div.dataset.id=post.id;
  div.innerHTML=postHTML(post);return div;
}
function postHTML(post){
  const photos=Array.isArray(post.photos)?post.photos:Object.values(post.photos||{});
  const likes=post.likes||{};
  const likeCount=Object.keys(likes).length;
  const liked=currentUser&&Object.values(likes).includes(currentUser.uid);
  const commentCount=Object.keys(post.comments||{}).length;
  const c=colorFor(post.author);
  const gridClass=photos.length===1?'one':photos.length===2?'two':photos.length>2?'many':'';
  const isOwn=currentUser&&post.uid===currentUser.uid;
  return`
    <div class="post-header">
      <div class="avatar" style="background:${c.bg};color:${c.fg}">${initials(post.author)}</div>
      <span class="post-author" style="color:${c.fg}">${esc(post.author)}</span>
      <span class="post-time">${timeAgo(post.ts||0)}</span>
      ${isOwn?`<button class="post-delete" onclick="deletePost('${post.id}')"><svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/></svg></button>`:''}
    </div>
    ${post.text?`<div class="post-body">${esc(post.text)}</div>`:''}
    ${photos.length?`<div class="post-photos ${gridClass}">${photos.map(u=>`<img src="${u}" loading="lazy">`).join('')}</div>`:''}
    <div class="post-actions">
      <button class="action-btn${liked?' liked':''}" onclick="toggleLike('${post.id}')">
        ${svgHeart(liked)}<span>${likeCount||''}</span>
      </button>
      <button class="action-btn" onclick="toggleComments('${post.id}')">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>${commentCount||''}</span>
      </button>
    </div>
    <div class="comments-section" id="cs-${post.id}">
      <div class="comments-list" id="cl-${post.id}"></div>
      <div class="comment-input-row">
        <div class="avatar" style="background:${colorFor(currentUser?.displayName||'').bg};color:${colorFor(currentUser?.displayName||'').fg};width:26px;height:26px;font-size:10px">${initials(currentUser?.displayName||'?')}</div>
        <input type="text" placeholder="Комментарий..." id="ci-${post.id}" onkeydown="if(event.key==='Enter')addComment('${post.id}')">
        <button class="send-btn" onclick="addComment('${post.id}')"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>
  `;
}

window.deletePost=async function(postId){
  if(!confirm('Удалить пост?'))return;
  await remove(ref(db,'posts/'+postId));
};

window.toggleLike=async function(postId){
  if(!currentUser)return;
  const post=postsMap[postId];if(!post)return;
  const likes=post.likes||{};
  const myKey=Object.keys(likes).find(k=>likes[k]===currentUser.uid);
  const updates={};
  if(myKey)updates[`posts/${postId}/likes/${myKey}`]=null;
  else updates[`posts/${postId}/likes/${Date.now()}`]=currentUser.uid;
  await update(ref(db),updates);
};

window.toggleComments=function(postId){
  const sec=document.getElementById('cs-'+postId);if(!sec)return;
  const open=sec.style.display==='none'||!sec.style.display;
  sec.style.display=open?'block':'none';
  if(open){
    renderComments(postId);
    setTimeout(()=>document.getElementById('ci-'+postId)?.focus(),50);
  }
};
function renderComments(postId){
  const post=postsMap[postId];if(!post)return;
  const list=document.getElementById('cl-'+postId);if(!list)return;
  const comments=Object.values(post.comments||{}).sort((a,b)=>(a.ts||0)-(b.ts||0));
  list.innerHTML=comments.map(cm=>{
    const c=colorFor(cm.author);
    return`<div class="comment">
      <div class="avatar" style="background:${c.bg};color:${c.fg};width:26px;height:26px;font-size:10px">${initials(cm.author)}</div>
      <div class="comment-bubble"><div class="comment-author" style="color:${c.fg}">${esc(cm.author)}</div><div class="comment-text">${esc(cm.text)}</div></div>
    </div>`;
  }).join('');
}
window.addComment=async function(postId){
  const inp=document.getElementById('ci-'+postId);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';
  const name=currentUser.displayName||currentUser.email.split('@')[0];
  const updates={};
  updates[`posts/${postId}/comments/${Date.now()}`]={author:name,uid:currentUser.uid,text,ts:Date.now()};
  await update(ref(db),updates);
};

// ── stats ─────────────────────────────────────────────
async function loadUserStats(){
  if(!currentUser)return;
  const snap=await get(ref(db,'posts'));
  let posts=0,likes=0;
  snap.forEach(c=>{
    const p=c.val();
    if(p.uid===currentUser.uid)posts++;
    if(p.likes&&Object.values(p.likes).includes(currentUser.uid))likes++;
  });
  document.getElementById('stat-posts').textContent=posts;
  document.getElementById('stat-likes').textContent=likes;
  const lbSnap=await get(ref(db,`leaderboard/${currentUser.uid}`));
  document.getElementById('stat-snake').textContent=lbSnap.exists()?lbSnap.val().score:0;
}

// ── SNAKE ─────────────────────────────────────────────
const CELL=20,COLS=14,ROWS=14;
let snake,dir,nextDir,food,score,gameLoop,gameRunning=false;

function initSnake(){
  const canvas=document.getElementById('snake-canvas');
  canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
  drawIdleScreen();
  loadLeaderboard();
  document.addEventListener('keydown',e=>{
    const map={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0]};
    if(map[e.key]){e.preventDefault();const d=map[e.key];if(d[0]!==-dir[0]||d[1]!==-dir[1])nextDir=d;}
  });
}
function drawIdleScreen(){
  const canvas=document.getElementById('snake-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);
}
window.setDir=function(x,y){if(!gameRunning)return;if(x!==-dir[0]||y!==-dir[1])nextDir=[x,y];};
window.startGame=function(){
  document.getElementById('game-overlay').style.display='none';
  snake=[[7,7],[6,7],[5,7]];dir=[1,0];nextDir=[1,0];score=0;
  document.getElementById('score-display').textContent=0;
  placeFood();gameRunning=true;
  if(gameLoop)clearInterval(gameLoop);
  gameLoop=setInterval(tick,150);
};
function placeFood(){
  let pos;do{pos=[Math.floor(Math.random()*COLS),Math.floor(Math.random()*ROWS)];}
  while(snake.some(s=>s[0]===pos[0]&&s[1]===pos[1]));food=pos;
}
function tick(){
  dir=nextDir;
  const head=[snake[0][0]+dir[0],snake[0][1]+dir[1]];
  if(head[0]<0||head[0]>=COLS||head[1]<0||head[1]>=ROWS||snake.some(s=>s[0]===head[0]&&s[1]===head[1])){
    endGame();return;
  }
  snake.unshift(head);
  if(head[0]===food[0]&&head[1]===food[1]){score++;document.getElementById('score-display').textContent=score;placeFood();}
  else snake.pop();
  draw();
}
function draw(){
  const canvas=document.getElementById('snake-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);
  // food
  ctx.fillStyle='#E74C3C';ctx.beginPath();
  ctx.arc(food[0]*CELL+CELL/2,food[1]*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?'#2ECC71':'#27AE60';
    ctx.beginPath();ctx.roundRect(s[0]*CELL+1,s[1]*CELL+1,CELL-2,CELL-2,4);ctx.fill();
  });
}
async function endGame(){
  gameRunning=false;clearInterval(gameLoop);
  document.getElementById('game-overlay').style.display='flex';
  document.getElementById('overlay-title').textContent='Игра окончена!';
  // save score
  if(currentUser){
    const name=currentUser.displayName||currentUser.email.split('@')[0];
    const lbRef=ref(db,`leaderboard/${currentUser.uid}`);
    const snap=await get(lbRef);
    const prev=snap.exists()?snap.val().score:0;
    const best=Math.max(prev,score);
    document.getElementById('best-score').textContent=best;
    document.getElementById('overlay-score').textContent=`Счёт: ${score} | Рекорд: ${best}`;
    if(score>prev)await update(ref(db),{[`leaderboard/${currentUser.uid}`]:{name,score,ts:Date.now()}});
  }
  loadLeaderboard();
}
async function loadLeaderboard(){
  const snap=await get(query(ref(db,'leaderboard'),orderByChild('score'),limitToLast(10)));
  const items=[];snap.forEach(c=>items.push(c.val()));items.sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const rankClasses=['gold','silver','bronze'];
  document.getElementById('lb-list').innerHTML=items.length?items.slice(0,10).map((it,i)=>`
    <div class="lb-item">
      <span class="lb-rank ${rankClasses[i]||''}">${medals[i]||i+1}</span>
      <span class="lb-name">${esc(it.name)}</span>
      <span class="lb-score">${it.score}</span>
    </div>`).join(''):'<div style="text-align:center;color:var(--text2);font-size:13px;padding:12px">Пока никто не играл</div>';
}
</script>
